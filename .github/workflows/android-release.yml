# 完整配置 - 签名 + Release APK/AAB + 自动发布到 GitHub Releases
name: Android APK 自动构建与发布

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]   # 打 tag 如 v1.0.0 时自动发布
  pull_request:
    branches: [ main, master ]

env:
  MAIN_MODULE: app
  BUILD_TYPE: release

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置JDK 17（含 Gradle 缓存）
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: 🤖 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 还原签名密钥（仅当 Secrets 存在时执行）
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ env.MAIN_MODULE }}/release.keystore

      - name: ⚙️ 写入签名信息到 gradle.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat >> gradle.properties << EOF
          KEYSTORE_FILE=${{ env.MAIN_MODULE }}/release.keystore
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: 📝 授予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 🚀 Gradle 缓存优化（提速 300%+）
        uses: gradle/actions/setup-gradle@v3

      - name: 🔨 构建 Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: 📦 构建 Release AAB（上架 Google Play）
        run: ./gradlew bundleRelease --no-daemon

      - name: 📤 上传 Release APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/*.apk

      - name: 📤 上传 Release AAB 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: app/build/outputs/bundle/release/*.aab

      - name: 🚀 自动发布到 GitHub Releases（打 tag 时触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
