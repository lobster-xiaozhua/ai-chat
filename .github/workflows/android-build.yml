name: Android — 自动构建与发布

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: "21"
  JAVA_DIST: "temurin"
  GRADLE_VERSION: "9.5.1"

jobs:

  build-debug:
    name: "Debug APK 构建"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: 🤖 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 🚀 安装 Gradle ${{ env.GRADLE_VERSION }} + 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: 🔍 诊断环境
        run: |
          echo "=== Java ===" && java -version 2>&1
          echo "=== Gradle ===" && gradle --version 2>&1 || echo "gradle not found"
          echo "=== ANDROID_HOME ===" && echo $ANDROID_HOME && ls $ANDROID_HOME 2>/dev/null || true

      - name: 🔨 构建 Debug APK
        id: build-debug
        run: |
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build-debug.log
        continue-on-error: true

      - name: 📤 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: ❌ 检查构建结果
        if: steps.build-debug.outcome != 'success'
        run: |
          echo "Debug build failed! Download build-debug-log artifact for details."
          exit 1

      - name: 🔍 定位产物
        id: find-artifact
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk-path=$APK" >> $GITHUB_OUTPUT
          echo "✅ 找到: $APK"
          ls -lh "$APK"

      - name: 📤 上传 Debug APK
        if: steps.find-artifact.outputs.apk-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: ${{ steps.find-artifact.outputs.apk-path }}
          if-no-files-found: error

  build-release:
    name: "Release APK / AAB 构建"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name != 'pull_request'

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: 🤖 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 还原签名密钥
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          echo "✅ release.keystore 已写入"

      - name: 📝 注入签名信息
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          cat >> gradle.properties <<'PROPS_EOF'
          KEYSTORE_FILE=app/release.keystore
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          PROPS_EOF

      - name: 🚀 安装 Gradle ${{ env.GRADLE_VERSION }} + 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: ${{ startsWith(github.ref, 'refs/tags/') == false && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: 🔨 构建 Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: 📦 构建 Release AAB
        run: gradle bundleRelease --no-daemon --stacktrace

      - name: 🔍 定位产物
        id: find-artifacts
        run: |
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          RELEASE_AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "release-apk=$RELEASE_APK" >> $GITHUB_OUTPUT
          echo "release-aab=$RELEASE_AAB" >> $GITHUB_OUTPUT
          [ -n "$RELEASE_APK" ] && ls -lh "$RELEASE_APK"
          [ -n "$RELEASE_AAB" ] && ls -lh "$RELEASE_AAB"

      - name: 📤 上传 Release APK
        if: steps.find-artifacts.outputs.release-apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.sha }}
          path: ${{ steps.find-artifacts.outputs.release-apk }}
          if-no-files-found: error

      - name: 📤 上传 Release AAB
        if: steps.find-artifacts.outputs.release-aab != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ github.sha }}
          path: ${{ steps.find-artifacts.outputs.release-aab }}
          if-no-files-found: error

      - name: 🗃️ 归集发布产物
        run: |
          mkdir -p release-artifacts
          cp ${{ steps.find-artifacts.outputs.release-apk }} release-artifacts/ || true
          cp ${{ steps.find-artifacts.outputs.release-aab }} release-artifacts/ || true
          ls -lh release-artifacts/

      - name: 🔗 上传发布产物（供 publish job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.sha }}
          path: release-artifacts/*
          retention-days: 7

  publish-release:
    name: "发布到 GitHub Releases"
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 下载发布产物
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 📋 准备发布说明
        id: notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag-name=$TAG_NAME" >> $GITHUB_OUTPUT
          cat > release-notes.md <<EOF
          # $TAG_NAME

          **自动构建 — Android AI-Chat 应用**

          | 信息 | 内容 |
          | --- | --- |
          | 提交 | ${{ github.sha }} |
          | 分支 | ${{ github.ref_name }} |
          | 构建时间 | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          ## 下载

          - **app-release.apk** — Android 安装包
          - **app-release.aab** — Android App Bundle
          EOF

      - name: 🚀 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.aab
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
